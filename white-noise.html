<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>沉浸式白噪音</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    .wn-page{
      position:fixed;inset:0;background:#080810;
      color:#fff;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
      display:flex;flex-direction:column;overflow:hidden;user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    [data-theme="light"] .wn-page{background:#f5f0ea!important;color:#1a1a1a}

    /* 顶部 */
    .wn-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;z-index:20}
    .wn-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);text-decoration:none;font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;background:rgba(255,255,255,.05);transition:all .2s}
    .wn-back:hover{color:#fff;background:rgba(255,255,255,.1)}
    [data-theme="light"] .wn-back{color:rgba(0,0,0,.4);background:rgba(0,0,0,.04)}[data-theme="light"] .wn-back:hover{color:#1a1a1a;background:rgba(0,0,0,.08)}
    .wn-theme-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
    [data-theme="light"] .wn-theme-btn{background:rgba(0,0,0,.04);color:rgba(0,0,0,.4)}

    /* ====== 标题 ====== */
    .wn-hero{text-align:center;padding:8px 0 0;flex-shrink:0}
    .wn-hero h1{font-family:Georgia,'Noto Serif SC','Times New Roman',serif;font-size:3.5rem;font-weight:800;letter-spacing:.06em;margin:0;line-height:1.1;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5)}
    .wn-hero p{font-size:15px;color:rgba(255,255,255,.42);margin:40px 0 0;letter-spacing:.14em;font-weight:300}
    [data-theme="light"] .wn-hero h1{color:#1a1a1a;text-shadow:none}[data-theme="light"] .wn-hero p{color:rgba(0,0,0,.4)}
    /* ====== 播放器 ====== */
    .wn-player{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:100px 0 6px}
    /* 播放唱片 — 同主页风格 */
    .wn-disc-stage{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
    .wn-disc{position:relative;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#2a2a3a,#0f0f1a);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.4),0 0 0 3px rgba(255,255,255,.08),0 0 0 6px rgba(0,0,0,.3);transition:box-shadow .4s;animation:discSpin 8s linear infinite;animation-play-state:paused}
    @keyframes discSpin{to{transform:rotate(360deg)}}
    .wn-disc.playing{animation-play-state:running;box-shadow:0 6px 32px rgba(99,102,241,.35),0 0 0 3px rgba(99,102,241,.2),0 0 0 6px rgba(0,0,0,.3)}
    .wn-disc:active{transform:scale(.95)}
    .wn-disc-groove{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.06);pointer-events:none}
    .wn-disc-groove:nth-child(1){inset:12%;border-color:rgba(255,255,255,.1)}.wn-disc-groove:nth-child(2){inset:24%;border-color:rgba(255,255,255,.07)}.wn-disc-groove:nth-child(3){inset:38%;border-color:rgba(255,255,255,.08)}.wn-disc-groove:nth-child(4){inset:52%;border-color:rgba(255,255,255,.05)}
    .wn-disc-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#e8e8f0,#8888a0);box-shadow:0 0 4px rgba(0,0,0,.5);pointer-events:none;z-index:1}
    .wn-disc-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:var(--color-surface,#fff);border:2px solid var(--color-border,#e8e3de);display:flex;align-items:center;justify-content:center;z-index:2;font-size:16px;color:var(--color-text,#1a1a2e);box-shadow:0 2px 10px rgba(0,0,0,.3);transition:transform .25s,border-color .25s,box-shadow .25s}
    .wn-disc-inner:hover{transform:translate(-50%,-50%) scale(1.12)}
    .wn-disc-inner:active{transform:translate(-50%,-50%) scale(.94)}
    [data-theme="light"] .wn-disc{background:radial-gradient(circle at 30% 30%,#e0dcd8,#c8c4c0)}[data-theme="light"] .wn-disc.playing{box-shadow:0 6px 32px rgba(99,102,241,.3),0 0 0 3px rgba(99,102,241,.15),0 0 0 6px rgba(0,0,0,.15)}
    /* 状态文字 */
    .wn-status{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-align:center;margin-top:10px;min-height:16px}
    [data-theme="light"] .wn-status{color:rgba(0,0,0,.35)}

    /* 卡片区 */
    .wn-cards{flex:1;min-height:0;position:relative;display:flex;align-items:flex-end;padding-bottom:40px}
    .wn-cards-scroll{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;padding:12px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center;width:100%;height:156px}
    .wn-cards-scroll::-webkit-scrollbar{display:none}
    /* 右侧渐隐提示可滚动 */
    .wn-cards::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;background:linear-gradient(to right,transparent,rgba(8,8,16,.8));pointer-events:none;z-index:5}
    [data-theme="light"] .wn-cards::after{background:linear-gradient(to right,transparent,rgba(235,240,245,.8))}
    .wn-card{flex:0 0 140px;width:140px;height:140px;align-self:center;border-radius:18px;position:relative;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;border:2px solid transparent;transition:transform .35s cubic-bezier(.34,1.56,.64,1),border-color .35s,box-shadow .35s;scroll-snap-align:start;pointer-events:auto}
    .wn-card:hover{transform:translateY(-4px) scale(1.05);border-color:rgba(255,255,255,.35);box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:10}
    .wn-card:active{transform:scale(.95);transition:transform .15s ease}
    .wn-card.active{transform:translateY(-4px) scale(1.05);border-color:rgba(255,255,255,.55);box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.1)}
    .wn-card.active::after{background:linear-gradient(to top,rgba(0,0,0,.5) 0%,rgba(0,0,0,.02) 55%)}
    .wn-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.05) 55%);pointer-events:none}
    .wn-card::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    .wn-card-label{position:absolute;bottom:10px;left:10px;right:8px;z-index:2;color:#fff;font-size:14px;font-weight:600;letter-spacing:.06em;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none}
    .wn-card-icon-sm{position:absolute;top:10px;left:10px;z-index:2;font-size:16px;color:rgba(255,255,255,.75);text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none}

    /* 底部栏 */
    .wn-bar{flex-shrink:0;background:rgba(8,8,16,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:8px 16px max(8px,env(safe-area-inset-bottom))}
    [data-theme="light"] .wn-bar{background:rgba(242,237,230,.94);border-top-color:rgba(0,0,0,.05)}
    .wn-bar-inner{display:flex;flex-direction:column;gap:7px;max-width:500px;margin:0 auto}
    .wn-vol-row{display:flex;align-items:center;gap:8px}
    .wn-vol-row i{font-size:14px;color:rgba(255,255,255,.35)}[data-theme="light"] .wn-vol-row i{color:rgba(0,0,0,.3)}
    .wn-slider{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer}
    [data-theme="light"] .wn-slider{background:rgba(0,0,0,.08)}
    .wn-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}[data-theme="light"] .wn-slider::-webkit-slider-thumb{background:#555}
    .wn-timers{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;padding:2px 0}
    .wn-timers::-webkit-scrollbar{display:none}
    .wn-timer-btn{padding:5px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;flex-shrink:0;white-space:nowrap;font-family:inherit;transition:all .2s}
    [data-theme="light"] .wn-timer-btn{border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.4)}
    .wn-timer-btn.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff;font-weight:600}
    [data-theme="light"] .wn-timer-btn.active{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.2);color:#333}

    /* 响应式 */
    @media(min-width:768px){.wn-disc{width:170px;height:170px}.wn-hero h1{font-size:3rem}.wn-disc-stage{width:230px;height:220px}.wn-disc-inner{width:54px;height:54px;font-size:22px}}
  </style>
</head>
<body class="wn-page">
  <div class="wn-top">
    <a href="/" class="wn-back"><i class="ri-arrow-left-line"></i> 返回主页</a>
    <button class="wn-theme-btn" id="theme-toggle-wn"><i class="ri-sun-line"></i></button>
  </div>
  <div class="wn-hero">
    <h1>沉浸式白噪音</h1>
    <p>聆听自然之声 · 安放疲惫心灵</p>
  </div>
  <div class="wn-player">
    <div class="wn-disc-stage">
      <div class="wn-disc" id="disc-play">
        <div class="wn-disc-groove"></div><div class="wn-disc-groove"></div><div class="wn-disc-groove"></div><div class="wn-disc-groove"></div>
        <div class="wn-disc-dot"></div>
        <div class="wn-disc-inner"><i class="ri-play-fill" id="disc-icon"></i></div>
      </div>
    </div>
    <div class="wn-status" id="status-label">选择声音 · 放松身心</div>
  </div>
  <div class="wn-cards"><div class="wn-cards-scroll" id="sound-grid"></div></div>
  <div class="wn-bar">
    <div class="wn-bar-inner">
      <div class="wn-vol-row">
        <i class="ri-volume-down-line"></i><input type="range" class="wn-slider" id="volume-slider" min="0" max="100" value="70"><i class="ri-volume-up-line"></i>
      </div>
      <div class="wn-timers" id="timer-bar">
        <button class="wn-timer-btn active" data-min="0">不限时</button><button class="wn-timer-btn" data-min="15">15分</button><button class="wn-timer-btn" data-min="30">30分</button><button class="wn-timer-btn" data-min="60">1小时</button><button class="wn-timer-btn" data-min="120">2小时</button>
      </div>
    </div>
  </div>
  <script src="js/sounds-data.js?v=20"></script>
	  <script src="js/audio-bridge.js?v=20"></script>
	  <script src="js/white-noise.js?v=23"></script>
</body>
</html>
