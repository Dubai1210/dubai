<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="338" rx="16" fill="url(#bg)"/>
  <ellipse cx="300" cy="140" rx="280" ry="150" fill="url(#glow)"/>

  <!-- 装饰粒子 -->
  <circle cx="80" cy="50" r="1.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="150" cy="70" r="1" fill="#A78BFA" opacity="0.3"/>
  <circle cx="450" cy="45" r="1.8" fill="#F59E0B" opacity="0.5"/>
  <circle cx="520" cy="80" r="1" fill="#A78BFA" opacity="0.3"/>
  <circle cx="100" cy="100" r="1.2" fill="#F59E0B" opacity="0.4"/>

  <!-- 日历图标 -->
  <g transform="translate(300, 100)" filter="url(#softShadow)">
    <!-- 日历底板 -->
    <rect x="-45" y="-30" width="90" height="70" rx="8" fill="#2d1b69" stroke="#F59E0B" stroke-width="2"/>
    <!-- 日历顶部横条 -->
    <rect x="-45" y="-30" width="90" height="20" rx="8" fill="url(#gold)"/>
    <rect x="-45" y="-18" width="90" height="8" fill="url(#gold)"/>
    <!-- 日历夹子 -->
    <rect x="-28" y="-38" width="6" height="18" rx="3" fill="#9CA3AF"/>
    <rect x="22" y="-38" width="6" height="18" rx="3" fill="#9CA3AF"/>
    <!-- 日期数字 -->
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#F59E0B" font-weight="700">11</text>
  </g>

  <!-- 左侧卡片1 -->
  <g transform="translate(95, 150)" opacity="0.85">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#1e1145" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
    <rect x="10" y="12" width="40" height="4" rx="2" fill="#F59E0B" opacity="0.7"/>
    <rect x="10" y="24" width="110" height="3" rx="1.5" fill="#A78BFA" opacity="0.4"/>
    <rect x="10" y="34" width="95" height="3" rx="1.5" fill="#A78BFA" opacity="0.3"/>
    <rect x="10" y="44" width="80" height="3" rx="1.5" fill="#A78BFA" opacity="0.2"/>
    <text x="15" y="68" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#818CF8" opacity="0.6">1997</text>
  </g>

  <!-- 右侧卡片2 -->
  <g transform="translate(375, 150)" opacity="0.85">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#1e1145" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
    <rect x="10" y="12" width="35" height="4" rx="2" fill="#F59E0B" opacity="0.7"/>
    <rect x="10" y="24" width="110" height="3" rx="1.5" fill="#A78BFA" opacity="0.4"/>
    <rect x="10" y="34" width="100" height="3" rx="1.5" fill="#A78BFA" opacity="0.3"/>
    <rect x="10" y="44" width="70" height="3" rx="1.5" fill="#A78BFA" opacity="0.2"/>
    <text x="15" y="68" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#818CF8" opacity="0.6">1960</text>
  </g>

  <!-- 连接线 -->
  <line x1="225" y1="190" x2="375" y2="190" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- 底部时间轴线 -->
  <line x1="80" y1="260" x2="520" y2="260" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <circle cx="150" cy="260" r="4" fill="#F59E0B" opacity="0.6"/>
  <circle cx="300" cy="260" r="5" fill="#F59E0B"/>
  <circle cx="450" cy="260" r="4" fill="#F59E0B" opacity="0.6"/>

  <!-- 标题文字 -->
  <text x="300" y="295" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="22" fill="#FDE68A" font-weight="700" letter-spacing="2">历史上的今天</text>
  <text x="300" y="318" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#A78BFA" letter-spacing="3">TODAY IN HISTORY</text>
</svg>
