<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="338" rx="16" fill="url(#bg)"/>
  <ellipse cx="300" cy="140" rx="280" ry="150" fill="url(#glow)"/>

  <!-- 月亮 -->
  <circle cx="440" cy="90" r="42" fill="#E0E7FF" opacity="0.9"/>
  <circle cx="455" cy="80" r="36" fill="url(#bg)" opacity="0.85"/>

  <!-- 星星 -->
  <circle cx="120" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="85" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="50" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="480" cy="55" r="1" fill="white" opacity="0.3"/>
  <circle cx="520" cy="100" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="90" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="160" cy="45" r="1.3" fill="white" opacity="0.5"/>

  <!-- 声波线 1 -->
  <path d="M40 170 Q80 140 120 170 Q160 200 200 170 Q240 140 280 170 Q320 200 360 170 Q400 140 440 170 Q480 200 520 170 Q550 150 560 170" stroke="url(#wave1)" stroke-width="2.5" fill="none"/>
  <!-- 声波线 2 -->
  <path d="M60 200 Q100 170 140 200 Q180 230 220 200 Q260 170 300 200 Q340 230 380 200 Q420 170 460 200 Q500 230 540 200" stroke="url(#wave2)" stroke-width="2" fill="none"/>
  <!-- 声波线 3 -->
  <path d="M30 230 Q80 195 130 230 Q180 265 230 230 Q280 195 330 230 Q380 265 430 230 Q480 195 530 230 Q560 245 570 230" stroke="url(#wave1)" stroke-width="1.8" fill="none" opacity="0.6"/>

  <!-- 标题文字 -->
  <text x="300" y="295" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="22" fill="#C7D2FE" font-weight="700" letter-spacing="2">白 噪 音</text>
  <text x="300" y="318" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#818CF8" letter-spacing="3">WHITE NOISE</text>
</svg>
