<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 48" fill="none">
  <defs>
    <linearGradient id="flowerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- 弓 — Kikyo的标志武器，弧形 -->
  <g opacity="0.25">
    <path d="M2 36 Q24 -2 46 36" stroke="url(#flowerGrad)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- 弓弦 -->
    <line x1="2" y1="36" x2="46" y2="36" stroke="url(#flowerGrad)" stroke-width="0.8" stroke-dasharray="1.5 1.5"/>
  </g>

  <!-- 桔梗花 — 五瓣星形花 -->
  <g transform="translate(28, 26)">
    <!-- 五片花瓣 -->
    <g opacity="0.92">
      <path d="M0,-13 C2,-13 4,-11 4,-7 C4,-3 2,0 0,0 C-2,0 -4,-3 -4,-7 C-4,-11 -2,-13 0,-13Z" fill="#8B5CF6"/>
      <path d="M0,-13 C2,-13 4,-11 4,-7 C4,-3 2,0 0,0 C-2,0 -4,-3 -4,-7 C-4,-11 -2,-13 0,-13Z" fill="#7C3AED" transform="rotate(72)"/>
      <path d="M0,-13 C2,-13 4,-11 4,-7 C4,-3 2,0 0,0 C-2,0 -4,-3 -4,-7 C-4,-11 -2,-13 0,-13Z" fill="#8B5CF6" transform="rotate(144)"/>
      <path d="M0,-13 C2,-13 4,-11 4,-7 C4,-3 2,0 0,0 C-2,0 -4,-3 -4,-7 C-4,-11 -2,-13 0,-13Z" fill="#7C3AED" transform="rotate(216)"/>
      <path d="M0,-13 C2,-13 4,-11 4,-7 C4,-3 2,0 0,0 C-2,0 -4,-3 -4,-7 C-4,-11 -2,-13 0,-13Z" fill="#8B5CF6" transform="rotate(288)"/>
    </g>
    <!-- 花蕊 -->
    <circle cx="0" cy="0" r="3" fill="#FBBF24"/>
    <circle cx="0" cy="0" r="2" fill="#F59E0B"/>
    <!-- 花瓣边缘高光 -->
    <circle cx="0" cy="-9.5" r="1.2" fill="white" opacity="0.15" transform="rotate(36)"/>
  </g>

  <!-- 文字 Dubai -->
  <text x="58" y="31" font-family="Georgia, 'DM Serif Display', 'Noto Serif SC', serif" font-size="24" font-weight="700" fill="#6366F1" letter-spacing="0.4">Dubai</text>

  <!-- 底部装饰线 -->
  <line x1="58" y1="37" x2="156" y2="37" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
</svg>
