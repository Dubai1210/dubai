<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>!function(){var m=localStorage.getItem('site-theme-mode')||'auto';var t;if(m==='auto'){var h=new Date().getHours();t=(h>=8&&h<18)?'light':'dark'}else{t=m}document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-theme-mode',m);try{var u=JSON.parse(localStorage.getItem('auth-user')||sessionStorage.getItem('auth-user')||'null');if(u&&u.username){document.documentElement.setAttribute('data-login-name',u.username);var i=setInterval(function(){var b=document.querySelectorAll('.btn-login');if(b.length){b.forEach(function(e){e.textContent=u.username;e.classList.add('logged-in')});clearInterval(i)}},10)}}catch(e){}}()</script>
  <title>历史上的今天 — Dubai</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/today-in-history.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

  <!-- ========== 导航栏 ========== -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-logo">
        <img src="assets/logo.svg" alt="Dubai" class="logo-img">
      </a>

      <nav class="navbar-menu" aria-label="主导航">
        <ul class="navbar-list">
          <li class="navbar-item has-dropdown">
            <button class="navbar-link dropdown-toggle" data-dropdown="blog">
              <span data-i18n="nav.blog">动态</span>
              <i class="ri-arrow-down-s-line dropdown-icon"></i>
            </button>
            <div class="dropdown-menu" id="dropdown-blog">
              <a href="projects.html" class="dropdown-item" data-i18n="nav.article">博客动态</a>
            </div>
          </li>
        </ul>
      </nav>

      <div class="navbar-actions">
        <div class="theme-dropdown" id="theme-dropdown">
          <button class="btn-icon theme-dropdown-toggle" id="theme-toggle" aria-label="切换主题">
            <i class="ri-sun-line theme-icon-light"></i>
            <i class="ri-moon-line theme-icon-dark"></i>
            <i class="ri-contrast-2-line theme-icon-auto"></i>
          </button>
          <div class="theme-dropdown-menu" id="theme-dropdown-menu">
            <button class="theme-option" data-theme="auto"><i class="ri-contrast-2-line"></i><span>自动</span></button>
            <button class="theme-option" data-theme="light"><i class="ri-sun-line"></i><span>浅色</span></button>
            <button class="theme-option" data-theme="dark"><i class="ri-moon-line"></i><span>深色</span></button>
          </div>
        </div>
        <button class="btn-language" id="language-toggle" aria-label="切换语言">
          <i class="ri-global-line"></i>
          <span data-i18n="nav.langLabel">中文</span>
        </button>
        <a href="#" class="btn-login" data-i18n="nav.login">登录</a>
        <button class="btn-icon hamburger-toggle" id="hamburger-toggle" aria-label="打开菜单">
          <i class="ri-menu-line hamburger-icon-open"></i>
          <i class="ri-close-line hamburger-icon-close"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== 移动端菜单 ========== -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
  <nav class="mobile-menu" id="mobile-menu" aria-label="移动端导航">
    <div class="mobile-menu-header">
      <span class="logo-text" data-i18n="mobile.logo">我的Logo</span>
      <button class="btn-icon mobile-menu-close" id="mobile-menu-close" aria-label="关闭菜单" data-i18n-attr="aria-label:mobile.close">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <ul class="mobile-menu-list">
      <li class="mobile-menu-item has-dropdown-mobile">
        <button class="mobile-menu-link mobile-dropdown-toggle" data-dropdown="blog-mobile">
          <span data-i18n="nav.blog">博客动态</span>
          <i class="ri-arrow-down-s-line dropdown-icon-mobile"></i>
        </button>
        <div class="mobile-submenu" id="submenu-blog-mobile">
          <a href="projects.html" class="mobile-submenu-item" data-i18n="nav.article">博客动态</a>
        </div>
      </li>
    </ul>
    <div class="mobile-menu-footer">
      <a href="#" class="btn-login" data-i18n="nav.login">登录</a>
      <button class="btn-language" id="language-toggle-mobile">
        <i class="ri-global-line"></i>
        <span data-i18n="nav.langMobile">切换语言</span>
      </button>
    </div>
  </nav>

  <!-- ========== 页面主体 ========== -->
  <main class="main-scroll">

    <!-- ========== 页面标题 ========== -->
    <section class="tih-hero">
      <div class="tih-hero-icon">
        <i class="ri-calendar-event-line"></i>
      </div>
      <h1 class="tih-title" data-i18n="tih.title">历史上的今天</h1>
      <p class="tih-date-display" id="tih-date-display"></p>
    </section>

    <!-- ========== 日期选择器 ========== -->
    <div class="tih-date-picker">
      <input type="date" id="tih-date-input" class="tih-date-input" aria-label="选择日期">
      <button id="tih-query-btn" class="tih-date-btn" data-i18n="tih.query">查询</button>
    </div>

    <!-- ========== 事件时间轴 ========== -->
    <div class="tih-timeline" id="tih-timeline">
      <!-- JS 动态渲染 -->
    </div>

    <!-- ========== 返回按钮 ========== -->
    <div class="tih-back">
      <a href="/" class="btn-primary">
        <i class="ri-arrow-left-line"></i>
        <span data-i18n="tih.back">返回主页</span>
      </a>
    </div>

    <!-- ========== 页脚 ========== -->
    <footer class="footer-section" id="footer">
      <div class="footer-brand">
        <img src="assets/logo.svg" alt="Dubai" class="footer-brand-logo">
      </div>
      <nav class="footer-nav" aria-label="页脚导航">
        <ul class="footer-nav-list">
          <li><a href="/" class="footer-nav-link" data-i18n="footer.blog">我的博客</a></li>
        </ul>
      </nav>
      <div class="footer-disclaimer-bar">
        <a href="disclaimer.html" class="footer-disclaimer-link">
          <i class="ri-shield-check-line"></i>
          <span data-i18n="footer.disclaimer">免责声明</span>
        </a>
      </div>
      <div class="footer-copyright">
        <p data-i18n="footer.copyright">&copy; 2026 Dubai. All rights reserved.</p>
      </div>
    </footer>

  </main>

  <!-- ========== 登录/注册/忘记密码模态框 ========== -->
  <div class="auth-modal-overlay" id="auth-modal-overlay">
    <div class="auth-modal" id="auth-modal">
      <button class="auth-modal-close" id="auth-modal-close" aria-label="关闭窗口">
        <i class="ri-close-line"></i>
      </button>

      <div class="auth-page active" id="login-page">
        <div class="auth-modal-header">
          <div class="auth-icon"><i class="ri-login-box-line"></i></div>
          <h2 class="auth-modal-title" data-i18n="login.title">欢迎回来</h2>
          <p class="auth-modal-subtitle" data-i18n="login.subtitle">登录你的账户继续</p>
        </div>
        <form class="auth-form" id="login-form">
          <div class="auth-form-group">
            <label class="auth-label" for="login-username" data-i18n="login.emailLabel">用户名或邮箱</label>
            <div class="auth-input-wrapper">
              <i class="ri-user-line auth-input-icon"></i>
              <input type="text" id="login-username" class="auth-input" placeholder="用户名或邮箱地址" required>
            </div>
          </div>
          <div class="auth-form-group">
            <label class="auth-label" for="login-password" data-i18n="login.passwordLabel">密码</label>
            <div class="auth-input-wrapper">
              <i class="ri-lock-line auth-input-icon"></i>
              <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>
              <button type="button" class="auth-password-toggle" id="login-password-toggle" aria-label="显示密码"><i class="ri-eye-off-line"></i></button>
            </div>
          </div>
          <div class="auth-form-options">
            <label class="auth-remember"><input type="checkbox" id="login-remember"><span data-i18n="login.remember">记住我</span></label>
            <a href="#" class="auth-forgot" id="show-forgot" data-i18n="login.forgot">忘记密码？</a>
          </div>
          <button type="submit" class="btn-primary auth-submit" data-i18n="login.submit">登录</button>
        </form>
        <div class="auth-footer">
          <span data-i18n="login.noAccount">还没有账户？</span>
          <a href="#" class="auth-link" id="show-register" data-i18n="login.register">立即注册</a>
        </div>
      </div>

      <div class="auth-page" id="register-page">
        <div class="auth-modal-header">
          <div class="auth-icon"><i class="ri-user-add-line"></i></div>
          <h2 class="auth-modal-title" data-i18n="register.title">创建账户</h2>
          <p class="auth-modal-subtitle" data-i18n="register.subtitle">注册一个新账户开始使用</p>
        </div>
        <form class="auth-form" id="register-form">
          <div class="auth-form-group">
            <label class="auth-label" for="register-username" data-i18n="register.usernameLabel">用户名</label>
            <div class="auth-input-wrapper"><i class="ri-user-line auth-input-icon"></i><input type="text" id="register-username" class="auth-input" placeholder="请输入用户名" required></div>
          </div>
          <div class="auth-form-group">
            <label class="auth-label" for="register-email" data-i18n="register.emailLabel">邮箱地址</label>
            <div class="auth-input-wrapper"><i class="ri-mail-line auth-input-icon"></i><input type="email" id="register-email" class="auth-input" placeholder="your@email.com" required></div>
          </div>
          <div class="auth-form-group">
            <label class="auth-label" for="register-code" data-i18n="register.codeLabel">验证码</label>
            <div class="auth-code-row">
              <div class="auth-input-wrapper auth-code-input-wrapper"><i class="ri-shield-keyhole-line auth-input-icon"></i><input type="text" id="register-code" class="auth-input" placeholder="请输入6位验证码" maxlength="6" required></div>
              <button type="button" class="btn-send-code" id="send-code-btn" data-i18n="register.sendCode">发送验证码</button>
            </div>
          </div>
          <div class="auth-form-group">
            <label class="auth-label" for="register-password" data-i18n="register.passwordLabel">密码</label>
            <div class="auth-input-wrapper"><i class="ri-lock-line auth-input-icon"></i><input type="password" id="register-password" class="auth-input" placeholder="至少8位密码" required><button type="button" class="auth-password-toggle" id="register-password-toggle" aria-label="显示密码"><i class="ri-eye-off-line"></i></button></div>
          </div>
          <div class="auth-form-group">
            <label class="auth-label" for="register-confirm-password" data-i18n="register.confirmLabel">确认密码</label>
            <div class="auth-input-wrapper"><i class="ri-lock-line auth-input-icon"></i><input type="password" id="register-confirm-password" class="auth-input" placeholder="再次输入密码" required><button type="button" class="auth-password-toggle" id="register-confirm-toggle" aria-label="显示密码"><i class="ri-eye-off-line"></i></button></div>
          </div>
          <button type="submit" class="btn-primary auth-submit" data-i18n="register.submit">注册</button>
        </form>
        <div class="auth-footer">
          <span data-i18n="register.hasAccount">已有账户？</span>
          <a href="#" class="auth-link" id="show-login-from-register" data-i18n="register.login">立即登录</a>
        </div>
      </div>

      <div class="auth-page" id="forgot-page">
        <div class="auth-modal-header">
          <div class="auth-icon"><i class="ri-lock-password-line"></i></div>
          <h2 class="auth-modal-title" data-i18n="forgot.title">忘记密码</h2>
          <p class="auth-modal-subtitle" data-i18n="forgot.subtitle">输入邮箱地址重置密码</p>
        </div>
        <form class="auth-form" id="forgot-form">
          <div class="auth-form-group">
            <label class="auth-label" for="forgot-email" data-i18n="forgot.emailLabel">邮箱地址</label>
            <div class="auth-input-wrapper"><i class="ri-mail-line auth-input-icon"></i><input type="email" id="forgot-email" class="auth-input" placeholder="your@email.com" required></div>
          </div>
          <button type="submit" class="btn-primary auth-submit" data-i18n="forgot.submit">发送重置链接</button>
        </form>
        <div class="auth-footer"><a href="#" class="auth-link" id="show-login-from-forgot" data-i18n="forgot.back">返回登录</a></div>
      </div>

      <div class="auth-page" id="reset-success-page">
        <div class="auth-modal-header">
          <div class="auth-icon success"><i class="ri-check-line"></i></div>
          <h2 class="auth-modal-title" data-i18n="forgot.successTitle">邮件已发送</h2>
          <p class="auth-modal-subtitle" data-i18n="forgot.successDesc">请检查你的邮箱并点击重置链接</p>
        </div>
        <div class="auth-success-info"><p data-i18n="forgot.successHint">没有收到邮件？请检查垃圾邮件文件夹</p></div>
        <button class="btn-primary auth-submit" id="back-to-login" data-i18n="forgot.backToLogin">返回登录</button>
      </div>

      <div class="auth-page" id="profile-page">
        <div class="auth-modal-header">
          <div class="auth-icon"><i class="ri-user-line"></i></div>
          <h2 class="auth-modal-title">个人资料</h2>
        </div>
        <div class="profile-info">
          <div class="profile-field"><span class="profile-label">用户名</span><span class="profile-value" id="profile-username">-</span></div>
          <div class="profile-field"><span class="profile-label">邮箱</span><span class="profile-value" id="profile-email">-</span></div>
          <div class="profile-field"><span class="profile-label">注册时间</span><span class="profile-value" id="profile-created">-</span></div>
        </div>
        <button class="btn-primary auth-submit btn-logout" id="btn-logout">退出登录</button>
      </div>
    </div>
  </div>

  <!-- ========== 返回顶部按钮 ========== -->
  <button class="back-to-top" id="back-to-top" aria-label="返回顶部">
    <i class="ri-arrow-up-line"></i>
  </button>

  <!-- ========== 背景音乐播放器 ========== -->
  <div class="audio-player" id="audio-player">
    <audio id="bg-music" src="audio/home/home-bg-music.mp3" loop preload="auto"></audio>
    <div class="audio-disc" id="audio-disc" data-i18n-attr="title:audio.bgMusic">
      <div class="disc-groove disc-groove-1"></div>
      <div class="disc-groove disc-groove-2"></div>
      <div class="disc-groove disc-groove-3"></div>
      <div class="disc-groove disc-groove-4"></div>
      <div class="disc-center-dot"></div>
    </div>
  </div>

  <script src="js/i18n.js?v=21"></script>
  <script src="js/sounds-data.js?v=21"></script>
  <script src="js/audio-bridge.js?v=21"></script>
  <script src="js/main.js?v=21"></script>
  <script src="js/today-in-history.js?v=23"></script>
</body>
</html>
